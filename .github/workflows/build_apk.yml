name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'

    - name: Build APK (Oficial Flet)
      run: |
        echo "🚀 INICIANDO BUILD LISO E DIRETO"

        # 1. Configura Ambiente
        python -m venv venv
        source venv/bin/activate
        pip install --upgrade pip
        pip install flet==0.28.3

        # 2. Entrando na pasta do app
        echo "📂 Entrando na pasta frontend..."
        cd frontend 

        # 3. Gera requirements e Roda o Build
        printf "flet==0.28.3\nrequests\ncertifi\nurllib3\ncharset-normalizer\nidna\n" > requirements.txt
        
        echo "🚀 Flet Build Iniciado com Permissões Nativas..."
        # É esta linha mágica que avisa o Android para liberar o GPS!
        flet build apk --permissions location 

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: vigiaa-release-FINAL-${{ github.run_number }}
        path: frontend/build/apk/app-release.apk