name: Build Android APK (Kivy)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Baixando o Código
        uses: actions/checkout@v4

      - name: Configurando o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configurando o Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalando Ferramentas do Ubuntu
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev libffi-dev libssl-dev autoconf automake libtool pkg-config unzip zip

      - name: Instalando Buildozer e Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython virtualenv setuptools

      - name: Escrevendo a Receita Perfeita (buildozer.spec)
        run: |
          cd frontend
          buildozer init || true
          
          cat << 'EOF' > config_spec.py
          lines = []
          with open('buildozer.spec', 'r') as f:
              for line in f:
                  if line.startswith('title ='): line = 'title = VigiAA\n'
                  elif line.startswith('package.name ='): line = 'package.name = vigiaa\n'
                  elif line.startswith('source.include_exts ='): line = 'source.include_exts = py,png,jpg,jpeg,kv,atlas,json,ttf\n'
                  elif line.startswith('requirements ='): line = 'requirements = python3, kivy==2.3.1, kivymd==1.2.0, pillow, requests, plyer\n'
                  elif line.startswith('# android.permissions ='): line = 'android.permissions = INTERNET, ACCESS_FINE_LOCATION, ACCESS_COARSE_LOCATION\n'
                  elif line.startswith('# android.accept_sdk_license ='): line = 'android.accept_sdk_license = True\n'
                  elif line.startswith('# android.api ='): line = 'android.api = 34\n'
                  elif line.startswith('# android.minapi ='): line = 'android.minapi = 24\n'
                  elif line.startswith('# android.archs ='): line = 'android.archs = arm64-v8a\n'
                  lines.append(line)
          with open('buildozer.spec', 'w') as f:
              f.writelines(lines)
          EOF
          python3 config_spec.py

      - name: Fabricar o APK (Verdadeiro Erro Revelado)
        # ISSO APAGA O NDK 27 DO GITHUB DA MEMÓRIA ANTES DE RODAR
        env:
          ANDROID_HOME: ''
          ANDROID_SDK_ROOT: ''
          ANDROID_NDK_HOME: ''
          ANDROID_NDK_ROOT: ''
        run: |
          cd frontend
          # TIRAMOS O "yes |" PARA O ERRO REAL APARECER SE DER RUIM
          buildozer android debug

      - name: Disponibilizar APK
        uses: actions/upload-artifact@v4
        with:
          name: vigiaa-apk-FINAL-${{ github.run_number }}
          path: frontend/bin/*.apk