name: Build Android APK (Kivy)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Baixando o Código
        uses: actions/checkout@v4

      - name: Configurando o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configurando o Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalando Ferramentas do Ubuntu
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libltdl-dev libffi-dev libssl-dev python3-dev zip unzip cmake

      - name: Instalando Buildozer e Cython Estável
        run: |
          pip install --upgrade pip
          # Fixar o Cython no 0.29.33 previne 99% dos erros de compilação do Kivy
          pip install buildozer cython==0.29.33 virtualenv

      - name: Preparando a Receita (buildozer.spec)
        run: |
          cd frontend
          buildozer init || true
          
          python3 -c "
          with open('buildozer.spec', 'r') as f: text = f.read()
          
          text = text.replace('title = My Application', 'title = VigiAA')
          text = text.replace('package.name = myapp', 'package.name = vigiaa')
          text = text.replace('source.include_exts = py,png,jpg,kv,atlas', 'source.include_exts = py,png,jpg,jpeg,kv,atlas,json,ttf')
          text = text.replace('requirements = python3, kivy==2.0.0', 'requirements = python3, kivy==2.3.1, kivymd, requests, plyer')
          text = text.replace('# android.permissions = INTERNET', 'android.permissions = INTERNET, ACCESS_FINE_LOCATION, ACCESS_COARSE_LOCATION')
          text = text.replace('# android.accept_sdk_license = False', 'android.accept_sdk_license = True')
          text = text.replace('# android.api = 27', 'android.api = 33')
          text = text.replace('# android.minapi = 21', 'android.minapi = 24')
          text = text.replace('log_level = 1', 'log_level = 2')
          
          with open('buildozer.spec', 'w') as f: f.write(text)
          "

      - name: Fabricar o APK (A MÁGICA ACONTECE AQUI)
        run: |
          cd frontend
          
          # APAGA AS VARIÁVEIS INIMIGAS DO GITHUB PARA FORÇAR O NDK 25b DO BUILDOZER
          unset ANDROID_HOME ANDROID_SDK_ROOT ANDROID_NDK_HOME ANDROID_NDK_ROOT
          
          yes | buildozer android debug

      - name: Disponibilizar APK
        uses: actions/upload-artifact@v4
        with:
          name: vigiaa-apk-release-${{ github.run_number }}
          path: frontend/bin/*.apk