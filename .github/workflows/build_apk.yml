name: Build Android APK (Kivy)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    # Isso resolve o aviso do Node.js de uma vez
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Baixando o Código do Repositório
        uses: actions/checkout@v4

      # Nós usamos um script Python rápido apenas para editar a receita
      - name: Preparar Receita do VigiAA (buildozer.spec)
        run: |
          cd frontend
          buildozer init || true
          
          python3 -c "
          with open('buildozer.spec', 'r') as f: text = f.read()
          
          # Nome e Pacote
          text = text.replace('title = My Application', 'title = VigiAA')
          text = text.replace('package.name = myapp', 'package.name = vigiaa')
          
          # Extensões (Assegurando imagens, fontes e layouts)
          text = text.replace('source.include_exts = py,png,jpg,kv,atlas', 'source.include_exts = py,png,jpg,jpeg,kv,atlas,json,ttf')
          
          # Requisitos (Cython forçado aqui dentro resolve o erro!)
          text = text.replace('requirements = python3, kivy==2.0.0', 'requirements = python3, kivy==2.3.1, kivymd, requests, plyer, cython')
          
          # Permissões do Celular
          text = text.replace('# android.permissions = INTERNET', 'android.permissions = INTERNET, ACCESS_FINE_LOCATION, ACCESS_COARSE_LOCATION')
          
          # Avisa ao Android para aceitar código mais moderno
          text = text.replace('# android.api = 27', 'android.api = 33')
          text = text.replace('# android.minapi = 21', 'android.minapi = 24')
          
          with open('buildozer.spec', 'w') as f: f.write(text)
          "

      # Essa Action faz toda a mágica suja (baixa Android SDK, NDK, aceita licenças) automaticamente
      - name: Fabricar o APK com Action Oficial
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          workdir: frontend
          buildozer_args: android debug

      # Pega o arquivo que a Action de cima gerou e disponibiliza pra baixar
      - name: Disponibilizar APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: vigiaa-apk-release-${{ github.run_number }}
          path: ${{ steps.buildozer.outputs.filename }}