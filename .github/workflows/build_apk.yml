name: Build Android APK (Kivy)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Baixando o Código
        uses: actions/checkout@v4

      - name: Configurando o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configurando o Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalando Ferramentas do Ubuntu
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev libffi-dev libssl-dev autoconf automake libtool pkg-config unzip zip

      - name: Instalando Buildozer e Cython (Versão Estável Garantida)
        run: |
          pip install --upgrade pip
          # CORREÇÃO CRÍTICA: Retornando ao Cython 0.29.x necessário para compilar o pyjnius/Kivy sem erros
          pip install buildozer cython==0.29.33 virtualenv setuptools

      - name: Criando a Receita do App
        run: |
          cd frontend
          rm -f buildozer.spec
          
          cat << 'EOF' > buildozer.spec
          [app]
          title = VigiAA
          package.name = vigiaa
          package.domain = org.ifcvigiaa
          source.dir = .
          source.include_exts = py,png,jpg,jpeg,kv,atlas,json,ttf
          version = 1.0
          
          requirements = hostpython3==3.11.8,python3==3.11.8,kivy==2.3.0,kivymd==1.2.0,pillow,requests,urllib3,charset-normalizer,idna,certifi,https://github.com/kivy/plyer/archive/master.zip
          
          orientation = portrait
          android.permissions = INTERNET, ACCESS_FINE_LOCATION, ACCESS_COARSE_LOCATION, CAMERA, READ_EXTERNAL_STORAGE, WRITE_EXTERNAL_STORAGE, READ_MEDIA_IMAGES
          android.accept_sdk_license = True
          android.api = 33
          android.ndk = 25b
          android.minapi = 24
          android.archs = arm64-v8a
          android.allow_backup = False
          
          android.manifest.launch_mode = singleTask
          android.low_memory_killer = False
          
          # CORREÇÃO CRÍTICA: Mantendo a branch master do p4a para compatibilidade com as receitas da API 33
          p4a.branch = master
          
          [buildozer]
          log_level = 2
          warn_on_root = 1
          EOF

      - name: Fabricar o APK
        # CORREÇÃO: Apontando diretamente para o SDK/NDK nativos e estáveis da máquina virtual
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/27.3.13750724
          ANDROID_NDK_ROOT: /usr/local/lib/android/sdk/ndk/27.3.13750724
        run: |
          cd frontend
          # Força o buildozer a aceitar as licenças automaticamente no terminal do GitHub
          yes | buildozer android debug

      - name: Disponibilizar APK
        uses: actions/upload-artifact@v4
        with:
          name: vigiaa-apk-FINAL-${{ github.run_number }}
          path: frontend/bin/*.apk
