name: Build Android APK (Kivy)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Baixando o Código
        uses: actions/checkout@v4

      - name: Configurando o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configurando o Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalando Ferramentas do Ubuntu
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev libffi-dev libssl-dev autoconf automake libtool pkg-config unzip zip

      - name: Instalando Buildozer e Cython (Versões Modernas e Fixadas)
        run: |
          pip install --upgrade pip
          # A CORREÇÃO FINAL: Fixando o Cython na versão que compila o jnius perfeitamente!
          pip install buildozer cython==0.29.33 virtualenv setuptools

      - name: Criando a Receita Pura do VigiAA
        run: |
          cd frontend
          rm -f buildozer.spec
          
          cat << 'EOF' > buildozer.spec
          [app]
          title = VigiAA
          package.name = vigiaa
          package.domain = org.ifcvigiaa
          source.dir = .
          source.include_exts = py,png,jpg,jpeg,kv,atlas,json,ttf
          version = 1.0
          
          # A MÁGICA FINAL: Adicionamos o combo de rede exato do seu teste (PoC)!
          requirements = python3,kivy==2.3.0,kivymd==1.2.0,pillow,requests,urllib3,charset-normalizer,idna,certifi,https://github.com/kivy/plyer/archive/master.zip
          
          orientation = portrait
          android.permissions = INTERNET, ACCESS_FINE_LOCATION, ACCESS_COARSE_LOCATION, CAMERA, READ_EXTERNAL_STORAGE, WRITE_EXTERNAL_STORAGE
          android.accept_sdk_license = True
          android.api = 33
          android.minapi = 24
          android.archs = arm64-v8a
          p4a.branch = master
          
          [buildozer]
          log_level = 2
          warn_on_root = 1
          EOF

      - name: Fabricar o APK
        env:
          ANDROID_HOME: ''
          ANDROID_SDK_ROOT: ''
          ANDROID_NDK_HOME: ''
          ANDROID_NDK_ROOT: ''
        run: |
          cd frontend
          buildozer android debug

      - name: Disponibilizar APK
        uses: actions/upload-artifact@v4
        with:
          name: vigiaa-apk-FINAL-${{ github.run_number }}
          path: frontend/bin/*.apk